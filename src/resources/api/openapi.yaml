openapi: 3.0.3
info:
  title: Kado Timesheet API
  version: 1.0.0
  description: API documentation for Kado Timesheet MVP.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Admin Users
  - name: Admin Projects
  - name: Admin Assignments
  - name: Employee Timesheets
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiEnvelope:
      type: object
      properties:
        data:
          nullable: true
        message:
          type: string
      required: [data, message]
    ApiError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
      required: [message, errors]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    UserSummary:
      type: object
      properties:
        id: { type: integer }
        full_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        department_id: { type: integer, nullable: true }
        position_id: { type: integer, nullable: true }
        role: { type: string, enum: [admin, employee] }
        status: { type: string, enum: [active, inactive, locked] }
        must_change_password: { type: boolean }
        updated_at: { type: string, format: date-time, nullable: true }
    ProjectSummary:
      type: object
      properties:
        id: { type: integer }
        project_code: { type: string }
        project_name: { type: string }
        status: { type: string, enum: [active, inactive, archived] }
        billable_flag: { type: boolean }
        description: { type: string, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    PaginatedUsers:
      type: object
      properties:
        current_page: { type: integer }
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        from: { type: integer, nullable: true }
        last_page: { type: integer }
        per_page: { type: integer }
        to: { type: integer, nullable: true }
        total: { type: integer }
    PaginatedProjects:
      type: object
      properties:
        current_page: { type: integer }
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
        from: { type: integer, nullable: true }
        last_page: { type: integer }
        per_page: { type: integer }
        to: { type: integer, nullable: true }
        total: { type: integer }
    AssignedProject:
      type: object
      properties:
        id: { type: integer }
        project_code: { type: string }
        project_name: { type: string }
        status: { type: string, enum: [active, inactive, archived] }
    TimesheetDetail:
      type: object
      properties:
        detail_id: { type: integer }
        project_id: { type: integer }
        project_code: { type: string }
        project_name: { type: string }
        hours_worked: { type: number, format: float }
        note: { type: string, nullable: true }
    TimesheetEntry:
      type: object
      properties:
        entry_id: { type: integer }
        work_date: { type: string, format: date }
        total_hours: { type: number, format: float }
        details:
          type: array
          items:
            $ref: "#/components/schemas/TimesheetDetail"
    TimesheetListData:
      type: object
      properties:
        month: { type: string, example: "2026-04" }
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TimesheetEntry"
        summary:
          type: object
          properties:
            total_hours_month: { type: number, format: float }
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Generic success response
        "429":
          description: Too many requests

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password by token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email: { type: string, format: email }
                token: { type: string }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password reset success
        "410":
          description: Token invalid or expired

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (authenticated user)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password, new_password_confirmation]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
                new_password_confirmation: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password changed
        "401":
          description: Unauthenticated
        "422":
          description: Current password invalid or validation error

  /admin/users:
    get:
      tags: [Admin Users]
      summary: List users
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: keyword
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive, locked] }
        - in: query
          name: department_id
          schema: { type: integer }
        - in: query
          name: position_id
          schema: { type: integer }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedUsers"
    post:
      tags: [Admin Users]
      summary: Create user
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, email]
              properties:
                full_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string, nullable: true }
                department_id: { type: integer, nullable: true }
                position_id: { type: integer, nullable: true }
                role: { type: string, enum: [admin, employee] }
                status: { type: string, enum: [active, inactive, locked] }
                send_invitation_email: { type: boolean }
      responses:
        "201":
          description: Created

  /admin/users/{id}:
    get:
      tags: [Admin Users]
      summary: User detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Success
    put:
      tags: [Admin Users]
      summary: Update user
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string, nullable: true }
                department_id: { type: integer, nullable: true }
                position_id: { type: integer, nullable: true }
                status: { type: string, enum: [active, inactive, locked] }
      responses:
        "200":
          description: Updated

  /admin/users/{id}/status:
    patch:
      tags: [Admin Users]
      summary: Lock/unlock user
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, inactive, locked] }
      responses:
        "200":
          description: Updated

  /admin/users/{id}/reset-password:
    post:
      tags: [Admin Users]
      summary: Reset user password
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                new_password: { type: string }
                send_invitation_email: { type: boolean }
      responses:
        "200":
          description: Reset success

  /admin/projects:
    get:
      tags: [Admin Projects]
      summary: List projects
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: keyword
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive, archived] }
        - in: query
          name: billable_flag
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedProjects"
    post:
      tags: [Admin Projects]
      summary: Create project
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_code, project_name, status, billable_flag]
              properties:
                project_code: { type: string }
                project_name: { type: string }
                status: { type: string, enum: [active, inactive, archived] }
                billable_flag: { type: boolean }
                description: { type: string, nullable: true }
      responses:
        "201":
          description: Created

  /admin/projects/{id}:
    get:
      tags: [Admin Projects]
      summary: Project detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Success
    put:
      tags: [Admin Projects]
      summary: Update project
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_code: { type: string }
                project_name: { type: string }
                status: { type: string, enum: [active, inactive, archived] }
                billable_flag: { type: boolean }
                description: { type: string, nullable: true }
      responses:
        "200":
          description: Updated

  /admin/projects/{id}/status:
    patch:
      tags: [Admin Projects]
      summary: Archive/restore project
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, inactive, archived] }
      responses:
        "200":
          description: Updated

  /admin/employee-projects:
    get:
      tags: [Admin Assignments]
      summary: Get assignments by employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: employee_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Success

  /admin/employee-projects/assign:
    post:
      tags: [Admin Assignments]
      summary: Assign projects to employee
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_id, project_ids]
              properties:
                employee_id: { type: integer }
                project_ids:
                  type: array
                  items: { type: integer }
      responses:
        "200":
          description: Updated

  /admin/employee-projects/unassign:
    post:
      tags: [Admin Assignments]
      summary: Unassign projects from employee
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_id, project_ids]
              properties:
                employee_id: { type: integer }
                project_ids:
                  type: array
                  items: { type: integer }
      responses:
        "200":
          description: Updated

  /my-projects:
    get:
      tags: [Employee Timesheets]
      summary: List my assigned active projects
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AssignedProject"

  /timesheets:
    get:
      tags: [Employee Timesheets]
      summary: List timesheets by month
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: string, example: "2026-04" }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TimesheetListData"
    post:
      tags: [Employee Timesheets]
      summary: Create one timesheet record
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [work_date, details]
              properties:
                work_date:
                  type: string
                  format: date
                details:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [project_id, hours_worked]
                    properties:
                      project_id: { type: integer }
                      hours_worked: { type: number, format: float }
                      note: { type: string, nullable: true }
      responses:
        "201":
          description: Created

  /timesheets/{entryId}:
    put:
      tags: [Employee Timesheets]
      summary: Update one timesheet record
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: entryId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [work_date, details]
              properties:
                work_date:
                  type: string
                  format: date
                details:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [project_id, hours_worked]
                    properties:
                      project_id: { type: integer }
                      hours_worked: { type: number, format: float }
                      note: { type: string, nullable: true }
      responses:
        "200":
          description: Updated

  /timesheets/details/{detailId}:
    delete:
      tags: [Employee Timesheets]
      summary: Delete one timesheet detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: detailId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
