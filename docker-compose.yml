services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kado-be-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./scripts/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${APP_PORT:-8080}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-kado}
      DB_USERNAME: ${DB_USERNAME:-kado}
      DB_PASSWORD: ${DB_PASSWORD:-kado}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kado.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Administrator}
      AUTO_SETUP: ${AUTO_SETUP:-true}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/usr/local/bin/entrypoint.sh"]
    command: ["php-fpm"]

  nginx:
    image: nginx:1.27-alpine
    container_name: kado-be-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: kado-be-db
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kado}
      POSTGRES_USER: ${DB_USERNAME:-kado}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kado}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kado} -d ${DB_DATABASE:-kado}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
